[package]
name = "smartnote_core"
version = "0.1.0"
edition = "2024"

[dependencies]
chrono = "0.4.42"
dirs-next = "2.0.0"
rusqlite = { version = "0.37.0", features = ["bundled", "serde_json", "uuid"] }
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.145"
thiserror = "2.0.17"
uuid = { version = "1.18.1", features = ["serde", "v4"] }
